function NetworkScreen() {
  const app = useApp();
  const vp = useViewport();
  const [clustersOpen, setClustersOpen] = React.useState(false);
  if (app.detailView === 'full') return <FullDetail />;
  const activeFilters = app.filterClusters ? app.filterClusters.size : 0;
  return (
    <div style={{ flex: 1, display: 'flex', minHeight: 0, overflow: 'hidden', position: 'relative' }}>
      <div style={{ flex: 1, position: 'relative', overflow: 'hidden', background: C.bgBase }}>
        <NetworkGraph />
        <StatsBar />
        <ZoomControls />
        <button onClick={() => setClustersOpen(true)} style={{
          position: 'absolute', top: 12, left: 12, zIndex: 6,
          display: 'flex', alignItems: 'center', gap: 7, padding: '8px 13px', borderRadius: 999,
          background: 'rgba(11,17,32,0.86)', border: `1px solid ${activeFilters ? C.amberBorder : C.borderDef}`,
          backdropFilter: 'blur(8px)', cursor: 'pointer', fontFamily: FONT, fontSize: 12.5,
          color: activeFilters ? C.amber : C.fg2,
        }}>
          <Icon name="filter" size={14} color="currentColor" />
          {activeFilters ? `Filters (${activeFilters})` : 'Filter'}
        </button>
        <ClustersPanel mobileOpen={clustersOpen} onClose={() => setClustersOpen(false)} />
        <SlideInDetail />
      </div>
    </div>
  );
}

function Screen() {
  const app = useApp();
  if (app.screen === 'settings') return <SettingsScreen />;
  if (!app.hasData) return <OnboardingScreen />;
  switch (app.screen) {
    case 'network': return <NetworkScreen />;
    case 'sources': return <SourcesScreen />;
    case 'search':  return <SearchScreen />;
    case 'reports': return <ReportsScreen />;
    case 'clusters': return <ClustersManageScreen />;
    case 'nodes':    return <NodesManageScreen />;
    case 'feeds':    return <SourcesManageScreen />;
    default:        return <NetworkScreen />;
  }
}

function App() {
  const vp = useViewport();
  if (vp.isMobile) {
    return (
      <AppProvider>
        <div style={{ flex: 1, display: 'flex', flexDirection: 'column', minWidth: 0, overflow: 'hidden' }}>
          <Screen />
          <MobileNav />
        </div>
        <AddSourceModal />
        <Toast />
      </AppProvider>
    );
  }
  return (
    <AppProvider>
      <Sidebar />
      <div style={{ flex: 1, display: 'flex', flexDirection: 'column', minWidth: 0, overflow: 'hidden' }}>
        <Screen />
      </div>
      <AddSourceModal />
      <Toast />
    </AppProvider>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>


</body></html>
